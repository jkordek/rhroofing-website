<svg
  width="400"
  height="200"
  viewBox="0 0 400 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Background -->
  <rect width="400" height="200" fill="#000000" />

  <!-- Gradient border -->
  <defs>
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D9A842" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>
  </defs>
  <rect
    x="5"
    y="5"
    width="390"
    height="190"
    fill="none"
    stroke="url(#borderGradient)"
    stroke-width="2"
  />

  <!-- Roof shapes -->
  <!-- White roof -->
  <polyline
    points="110,90 160,50 210,90"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <polyline
    points="140,90 140,115"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="4"
    stroke-linecap="round"
  />

  <!-- Orange roof -->
  <polyline
    points="190,90 240,50 290,90"
    fill="none"
    stroke="#D9A842"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <polyline
    points="220,90 220,115"
    fill="none"
    stroke="#D9A842"
    stroke-width="4"
    stroke-linecap="round"
  />

  <!-- Company name -->
  <text
    x="200"
    y="140"
    text-anchor="middle"
    fill="#FFFFFF"
    font-size="18"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="700"
  >
    NATURAL FLOW ROOFING SYSTEMS
  </text>

  <!-- Phone number -->
  <text
    x="200"
    y="165"
    text-anchor="middle"
    fill="#FFFFFF"
    font-size="16"
    font-family="Arial, Helvetica, sans-serif"
  >
    07440448919
  </text>
</svg>
